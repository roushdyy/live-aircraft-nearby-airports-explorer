<!DOCTYPE html>
<html>
<head>
    <title>History</title>
</head>

<body>

<h1>Search History</h1>

<table border="1">

<tr>
    <th>City</th>
    <th>Latitude</th>
    <th>Longitude</th>
</tr>

{% for search in searches %}

<tr>
    <td>{{ search.city }}</td>
    <td>{{ search.latitude }}</td>
    <td>{{ search.longitude }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
