<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1>Search History</h1>
    <table class="table table-bordered">
        <thead><tr><th>City</th><th>Latitude</th><th>Longitude</th><th>Timestamp</th><th>Action</th></tr></thead>
        <tbody>
        {% for s in searches %}
        <tr>
            <td>{{ s.city }}</td><td>{{ s.latitude }}</td><td>{{ s.longitude }}</td><td>{{ s.timestamp }}</td>
            <td><a href="/delete/{{ s.id }}" class="btn btn-danger btn-sm" onclick="return confirm('Delete?')">Delete</a></td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-primary">New Search</a>
    <a href="/control_panel" class="btn btn-info">Control Panel</a>
</body>
</html>
